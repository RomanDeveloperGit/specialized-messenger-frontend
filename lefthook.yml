pre-commit:
  jobs:
    # Если ругается на нехватку прав, то сделайте:
    # chmod +x .lefthook/pre-commit/check_unpulled.sh
    - run: .lefthook/pre-commit/check_unpulled.sh
    - run: |
        npx eslint {staged_files} --fix && \
        npx stylelint {staged_files} --fix && \
        npx prettier --write {staged_files}
      glob: '**/*.{ts,tsx,js,jsx}'
      stage_fixed: true
    - run: npx eslint {staged_files}
      glob: '**/*.{ts,tsx,js,jsx}'
    - run: npx stylelint {staged_files}
      glob: '**/*.{ts,tsx,js,jsx}'

commit-msg:
  jobs:
    - run: yarn run commitlint --edit {1}
