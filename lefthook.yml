pre-commit:
  jobs:
    # Если ругается на нехватку прав, то сделайте:
    # chmod +x .lefthook/pre-commit/check_unpulled.sh
    - run: .lefthook/pre-commit/check_unpulled.sh
    - run: |
        yarn eslint {staged_files} --fix && \
        yarn stylelint {staged_files} --fix && \
        yarn prettier {staged_files} --write
      glob: '**/*.{ts,tsx,js,jsx,css}'
      stage_fixed: true
    - run: npx eslint {staged_files}
      glob: '**/*.{ts,tsx,js,jsx}'
    - run: yarn stylelint {staged_files}
      glob: '**/*.{css}'

commit-msg:
  jobs:
    - run: yarn run commitlint --edit {1}
